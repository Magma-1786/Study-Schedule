    .card-label { font-size: 0.68rem; letter-spacing: 0.2em; color: #666; text-transform: uppercase; margin-bottom: 0.75rem; font-family: sans-serif; }

    .progress-track { background: #0f0f13; border-radius: 99px; height: 7px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4f8ef7, #3dbf7e); border-radius: 99px; transition: width 0.35s ease; }
    .progress-pct { text-align: right; font-size: 0.7rem; color: #444; margin-top: 0.3rem; font-family: sans-serif; }

    .exam-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .exam-chip { background: #0f0f13; border-radius: 6px; padding: 0.35rem 0.65rem; font-size: 0.75rem; border: 1px solid #2a2a35; font-family: sans-serif; }

    .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.75rem; }
    .filter-btn {
      background: #1a1a22; color: #888; border: 1px solid #2a2a35;

      cursor: pointer; font-family: sans-serif; transition: all 0.2s;
    }
    .filter-btn.active { color: #0f0f13; border-color: transparent; font-weight: 700; }

    .day-wrap.weekend { opacity: 0.82; }
    .day-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1.1rem; border-radius: 10px;
      border: 1px solid #2a2a35; cursor: pointer;
      background: #16161f; transition: background 0.15s, border-color 0.15s;
      user-select: none;

    .day-header.open { border-radius: 10px 10px 0 0; background: #1e1e2a; border-bottom-color: #2a2a35; }
    .day-header.all-done { background: #0c1a0c; border-color: #3dbf7e33; }
    .day-header.is-exam { border-color: #e8e4dc22; }
    .day-header.is-cycle { border-color: #f7c94f44; }
    .day-header.is-push { border-color: #4f8ef744; }

    .day-title { flex: 1; display: flex; align-items: center; flex-wrap: wrap; gap: 0.35rem; }
    .day-title strong { font-size: 0.95rem; }
    .day-title strong.done { text-decoration: line-through; color: #555; }
    .badge {
      font-size: 0.68rem; padding: 0.1rem 0.5rem; border-radius: 10px;
      font-family: sans-serif; font-weight: 600;
    }
    .badge.today   { color: #4f8ef7; background: #4f8ef720; }
    .badge.exam    { color: #e8e4dc; background: #ffffff15; }
    .badge.cycle   { color: #f7c94f; background: #f7c94f20; }
    .badge.push    { color: #e05c7d; background: #e05c7d20; }
    .badge.weekend { color: #555; background: transparent; }
    .badge.done-badge { color: #3dbf7e; background: transparent; }

    .day-count { font-size: 0.7rem; color: #555; font-family: sans-serif; margin-right: 0.25rem; }
    .day-count.done { color: #3dbf7e; }
    .day-chevron { font-size: 0.75rem; color: #444; }

      background: #1e1e2a; border-radius: 0 0 10px 10px;
      border: 1px solid #2a2a35; border-top: none; overflow: hidden;
    }
    .session-row {
      display: flex; gap: 1rem; padding: 0.9rem 1.1rem;

    .session-row.checked { background: #0c1a0c; }
    .session-row.no-check { cursor: default; }

      margin-top: 2px; border: 2px solid #333;

    .footer { text-align: center; margin-top: 2.5rem; color: #3a3a45; font-size: 0.72rem; font-family: sans-serif; }
  </style>

// --- State ---
let checked = {};
let openDay = null;
let activeFilter = "All";

try { checked = JSON.parse(localStorage.getItem("study-checked") || "{}"); } catch(_){}

function save() {
  try { localStorage.setItem("study-checked", JSON.stringify(checked)); } catch(_){}
}

// --- Helpers ---
function isCheckable(s) { return s.sub !== "Rest / Light Review" && s.time !== "EXAM"; }
function ck(di, si) { return `${di}-${si}`; }

function allCheckable() {
  return SCHEDULE.flatMap((d,di) => d.sessions.map((s,si) => ({di,si,s})).filter(x => isCheckable(x.s)));
}
function doneCount() { return allCheckable().filter(x => checked[ck(x.di,x.si)]).length; }
function totalCount() { return allCheckable().length; }

// --- Render exam chips ---
function renderExamChips() {
  const el = document.getElementById("exam-chips");
  el.innerHTML = Object.entries(EXAM_DATES).map(([date, exams]) =>
    `<div class="exam-chip"><span class="date">${date}</span>${exams.map(e=>`<span style="color:${e.c};font-weight:700">${e.s}</span>`).join(" ")}</div>`
  ).join("");
}

// --- Render filters ---
function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = SUBJECTS.map(s => {
    const col = COLORS[s] || "#e8e4dc";
    const active = activeFilter === s;
    return `<button class="filter-btn${active?" active":""}" data-sub="${s}" style="${active?`background:${col};`:""}">${s}</button>`;
  }).join("");
  el.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => { activeFilter = btn.dataset.sub; renderAll(); });
  });
}

// --- Render progress ---
function renderProgress() {
  const done = doneCount(), total = totalCount();
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById("progress-text").textContent = `${done} / ${total}`;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-pct").textContent = pct + "%";
}

// --- Render schedule ---
function renderSchedule() {
  const el = document.getElementById("schedule");
  el.innerHTML = "";

  SCHEDULE.forEach((day, di) => {
    const visibleSessions = activeFilter === "All"
      ? day.sessions
      : day.sessions.filter(s => s.sub === activeFilter || s.sub === "Rest / Light Review");
    if (!visibleSessions.length) return;

    const checkable = visibleSessions.filter(s => isCheckable(s));
    const dayDone = checkable.filter((_,j) => {
      const si = day.sessions.indexOf(checkable[j]);
      return checked[ck(di, si)];
    }).length;

    // recalculate using original indices
    const checkableOrig = day.sessions.map((s,si)=>({s,si})).filter(x=>isCheckable(x.s));
    const dayDoneOrig = checkableOrig.filter(x=>checked[ck(di,x.si)]).length;
    const dayTotalOrig = checkableOrig.length;
    const allDone = dayTotalOrig > 0 && dayDoneOrig === dayTotalOrig;
    const isOpen = openDay === di;

    // Header classes
    let hClass = "day-header";
    if (isOpen) hClass += " open";
    if (allDone) hClass += " all-done";
    else if (day.isExam) hClass += " is-exam";
    else if (day.isCycleTest) hClass += " is-cycle";
    else if (day.isExamWeek) hClass += " is-push";

    // Badges
    let badges = "";
    if (day.isToday) badges += `<span class="badge today">Today</span>`;
    if (day.isExam) badges += `<span class="badge exam">📝 Exam</span>`;
    if (day.isCycleTest) badges += `<span class="badge cycle">📋 Cycle test</span>`;
    if (day.isExamWeek && !day.isExam) badges += `<span class="badge push">Final push</span>`;
    if (day.isWeekend && !day.isExam && !day.isCycleTest) badges += `<span class="badge weekend">Weekend</span>`;
    if (allDone) badges += `<span class="badge done-badge">✓ Done</span>`;

    const countHtml = dayTotalOrig > 0
      ? `<span class="day-count${allDone?" done":""}">${dayDoneOrig}/${dayTotalOrig}</span>` : "";

    const wrap = document.createElement("div");
    wrap.className = `day-wrap${day.isWeekend?" weekend":""}`;

    wrap.innerHTML = `
      <div class="${hClass}" data-di="${di}">
        <div class="day-title">
          <strong class="${allDone?"done":""}">${day.date}</strong>
          ${badges}
        </div>
        ${countHtml}
        <span class="day-chevron">${isOpen?"▲":"▼"}</span>
      </div>
      ${isOpen ? renderSessionsHTML(day, di, visibleSessions) : ""}
    `;

    wrap.querySelector(".day-header").addEventListener("click", () => {
      openDay = openDay === di ? null : di;
      renderSchedule();
    });

    if (isOpen) {
      wrap.querySelectorAll(".session-row").forEach(row => {
        const di2 = parseInt(row.dataset.di);
        const si2 = parseInt(row.dataset.si);
        if (row.dataset.checkable === "true") {
          row.addEventListener("click", () => {
            const k = ck(di2, si2);
            checked[k] = !checked[k];
            save();
            renderProgress();
            renderSchedule();
          });
        }
      });
    }

    el.appendChild(wrap);
  });
}

function renderSessionsHTML(day, di, visibleSessions) {
  const rows = visibleSessions.map(s => {
    const si = day.sessions.indexOf(s);
    const isDone = !!checked[ck(di, si)];
    const checkable = isCheckable(s);
    const isExamTime = s.time === "EXAM";
    const col = COLORS[s.sub] || "#888";

    const cbStyle = isDone
      ? `background:${col};border-color:${col}`
      : `border-color:${isExamTime?"#2a2a35":col+"66"}`;

    return `
      <div class="session-row${isDone?" checked":""}${!checkable?" no-check":""}" data-di="${di}" data-si="${si}" data-checkable="${checkable}">
        <div class="checkbox" style="${cbStyle}">${isDone?"✓":""}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.2rem">
            <span class="session-subject${isDone?" checked":""}" style="color:${isDone?"#444":col}">${s.sub}</span>
            <span class="session-time${isExamTime?" exam-time":""}">· ${s.time}</span>
          </div>
          <div class="session-task${isDone?" checked":""}">${s.task}</div>
        </div>
      </div>`;
  }).join("");
  return `<div class="sessions-panel">${rows}</div>`;
}

function renderAll() {
  renderProgress();
  renderFilters();
  renderSchedule();
}

renderExamChips();
renderAll();
</script>
</body>
</html>
